<div id="container">
  <h1>Education Details</h1>
  <div class="card">
    <p-timeline [value]="events" align="left" styleClass="customized-timeline">
      <ng-template pTemplate="marker" let-event>
        <span class="custom-marker shadow-2" [style.color]="event.color">
          <i [ngClass]="event.icon"></i>
        </span>
      </ng-template>
      <ng-template pTemplate="content" let-event>
        <p-card>
          <ng-template pTemplate="header">
            <div style="display:flex;">
              <div style="margin: 10px;"><img alt="Card"
                  style="width:100px;height: 100px;border-radius: 100px;position: relative;top: 50%;left: 50%;transform: translate(-50%,-50%);"
                  [src]="event.schoolLogo" /></div>
              <div style="display: flex;flex-direction: column;">
                <div>
                  <h2 style="margin-bottom: 0;">{{event.schoolName}}</h2>
                </div>
                <div>
                  <h4 style="margin-bottom: 0;">{{event.startDate}} - {{event.endDate}}</h4>
                </div>
              </div>
            </div>
          </ng-template>
          <ng-template pTemplate="content">
            <div class="card-content" style="display: flex;flex-direction:column;">
              <div style="align-items: center;display: flex;flex-direction: row;">
                <div style="margin: 10px;">
                  <h3>Skills</h3>
                </div>
                <div class="card flex align-items-center gap-2 flex-wrap">
                  <ng-container style="margin: 10px;" *ngFor="let item of event.skill;let i = index">
                    <p-chip *ngIf="i<5" class="margin10" [label]="item.name" [image]="item.logo"></p-chip>
                    <p-chip *ngIf="i==5" class="margin10" label="More" image="../../assets/images/skills/more.jpeg"></p-chip>
                  </ng-container>

                </div>
              </div>
            </div>
          </ng-template>

          <ng-template pTemplate="footer">
            <div style="display: flex;flex-direction: row;">
              <div>
                <p-button label="Save" id="save" icon="pi pi-check"></p-button>
              </div>
              <div>
                <p-button label="Cancel" id="cancel" icon="pi pi-times"></p-button>
              </div>

            </div>
          </ng-template>
        </p-card>
      </ng-template>
    </p-timeline>
  </div>
</div>
